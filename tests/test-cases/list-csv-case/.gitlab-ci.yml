---
stages: [test, build, deploy]

# @Description Run Tests
test-job:
  stage: test
  script:
    - echo ${GITLAB_USER_LOGIN}
    - '>&2 echo "Hello, error!"'

build-job:
  stage: build
  needs: [test-job]
  allow_failure: true
  script:
    - 'echo "Build something"'

exit-codes-job:
  stage: build
  needs: []
  allow_failure:
    exit_codes: [42, 137]
  script:
    - 'echo "Exit codes"'

deploy-job:
  stage: deploy
  allow_failure:
    exit_codes: 1
  script:
    - 'echo "Deploy"'
